services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ragol
      POSTGRES_PASSWORD: ragol
      POSTGRES_DB: ragol
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragol"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
